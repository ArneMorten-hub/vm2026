<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VM-konkurranse 2026</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.5/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;
  --white:#ffffff;
  --card:#ffffff;
  --blue:#2563eb;--blue2:#1d4ed8;--blue3:#1e40af;
  --blue-light:#eff6ff;--blue-mid:#bfdbfe;--blue-dark:#1e3a8a;
  --green:#059669;--green-light:#d1fae5;--green-dark:#065f46;
  --amber:#d97706;--amber-light:#fef3c7;
  --red:#dc2626;--red-light:#fee2e2;
  --text:#111827;--text2:#374151;--muted:#6b7280;--dim:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --r:10px;--r2:14px;--r3:20px;--r4:28px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── Landing / Auth ── */
.landing{min-height:100vh;background:linear-gradient(160deg,#eff6ff 0%,#e0ecff 50%,#dbeafe 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.landing::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(37,99,235,.12),transparent 70%);pointer-events:none}
.landing::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(16,185,129,.1),transparent 70%);pointer-events:none}
.landing-card{width:100%;max-width:440px;background:var(--white);border-radius:var(--r4);padding:44px 40px;box-shadow:var(--shadow-lg),0 0 0 1px rgba(37,99,235,.08);position:relative;z-index:1;animation:fadeUp .4s ease}
.landing-top{text-align:center;margin-bottom:32px}
.landing-ball{font-size:52px;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(37,99,235,.2))}
.landing-title{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.landing-sub{color:var(--muted);font-size:14px;line-height:1.5}
.landing-sub strong{color:var(--blue)}
.inp-label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.inp{width:100%;padding:13px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);color:var(--text);font-size:15px;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:var(--white)}
.inp-field{margin-bottom:16px}
.btn-primary{width:100%;padding:14px;background:var(--blue);color:#fff;border-radius:var(--r2);font-size:15px;font-weight:700;transition:all .2s;box-shadow:0 4px 14px rgba(37,99,235,.3);margin-top:4px}
.btn-primary:hover{background:var(--blue2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.err-msg{color:var(--red);font-size:13px;background:var(--red-light);border:1px solid rgba(220,38,38,.2);border-radius:var(--r);padding:10px 14px;margin-top:10px;text-align:center}
.landing-note{text-align:center;font-size:12px;color:var(--dim);margin-top:16px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ── App shell ── */
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{height:62px;background:var(--white);border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.topbar-l{display:flex;align-items:center;gap:12px}
.topbar-ball{font-size:26px}
.topbar-brand{font-size:17px;font-weight:800;color:var(--blue);letter-spacing:-.3px}
.topbar-year{font-size:11px;color:var(--dim);margin-top:1px}
.topbar-r{display:flex;align-items:center;gap:10px}
.topbar-user{font-size:13px;color:var(--muted);font-weight:600}
.btn-ghost{background:var(--white);border:1.5px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .15s}
.btn-ghost:hover{border-color:var(--red);color:var(--red)}
nav{background:var(--white);border-bottom:1.5px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nb{padding:0 22px;height:46px;background:transparent;color:var(--muted);font-size:14px;font-weight:600;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center}
.nb:hover{color:var(--text2)}
.nb.on{color:var(--blue);border-bottom-color:var(--blue)}
.page{max-width:980px;margin:0 auto;padding:28px 20px 80px;width:100%}

/* ── Dashboard ── */
.dash-hero{text-align:center;padding:12px 20px 10px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;margin:-28px -20px 16px;border-radius:0 0 var(--r4) var(--r4)}
.dash-ball{display:none}
.dash-title{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:2px}
.dash-greeting{font-size:14px;opacity:.9}
.deadline-banner{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r3);padding:20px 24px;margin-bottom:24px;text-align:center;box-shadow:var(--shadow)}
.deadline-text{font-size:14px;color:var(--muted);margin-bottom:12px}
.deadline-text strong{color:var(--text)}
.countdown{display:flex;align-items:center;justify-content:center;gap:6px}
.cd-unit{display:flex;flex-direction:column;align-items:center;background:var(--blue-light);border:1.5px solid var(--blue-mid);border-radius:var(--r2);padding:6px 10px;min-width:46px}
.cd-num{font-size:18px;font-weight:800;color:var(--blue);line-height:1}
.cd-label{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.cd-sep{font-size:15px;font-weight:800;color:var(--blue-mid);margin-bottom:8px}
.deadline-passed{font-size:16px;font-weight:700;color:var(--red);background:var(--red-light);padding:10px 20px;border-radius:var(--r2);display:inline-block}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
@media(max-width:680px){.dash-grid{grid-template-columns:1fr}}
.dash-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r3);padding:24px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--blue);border-radius:var(--r3) var(--r3) 0 0}
.dash-card-icon{font-size:28px;margin-bottom:10px}
.dash-card-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
.dash-card-sub{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.dash-stat{font-size:13px;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.dash-stat-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.dash-stat-fill{height:5px;background:var(--blue);border-radius:3px;transition:width .6s}
.dash-stat-fill.green{background:var(--green)}
.dash-stat-num{font-size:11px;font-weight:700;color:var(--muted);min-width:36px;text-align:right}
.btn-dash{width:100%;padding:11px;background:var(--blue);color:white;border-radius:var(--r2);font-size:14px;font-weight:700;margin-top:14px;transition:all .15s;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-dash:hover{background:var(--blue2);transform:translateY(-1px)}
.btn-dash.green{background:var(--green);box-shadow:0 2px 8px rgba(5,150,105,.25)}
.btn-dash.green:hover{background:var(--green-dark)}
.btn-dash.outline{background:transparent;border:1.5px solid var(--blue);color:var(--blue)}
.btn-dash.outline:hover{background:var(--blue-light)}
.lb-mini-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.lb-mini-row:last-child{border-bottom:none}
.lb-top-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:24px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:2px}
.lb-mini-rank{font-size:15px;min-width:24px}
.lb-mini-name{flex:1;font-size:13px;font-weight:600}
.lb-mini-pts{font-size:13px;font-weight:700;color:var(--blue)}
.submitted-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-light);color:var(--green-dark);font-size:13px;font-weight:700;padding:8px 16px;border-radius:var(--r2);border:1px solid rgba(5,150,105,.2);margin-top:10px}

/* ── Group cards grid ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:18px;font-weight:800;color:var(--text)}
.section-chip{background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.group-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r3);padding:16px 18px;cursor:pointer;transition:all .2s;position:relative}
.group-card:hover{border-color:var(--blue-mid);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.group-card.complete{border-color:rgba(5,150,105,.4);box-shadow:0 0 0 1px rgba(5,150,105,.15),var(--shadow)}
.group-card.partial{border-color:var(--blue-mid)}
.gc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.gc-letter{width:44px;height:44px;background:var(--blue-light);border:1.5px solid var(--blue-mid);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(--blue)}
.gc-info{flex:1}
.gc-title{font-size:14px;font-weight:800;color:var(--text)}
.gc-sub{font-size:12px;color:var(--muted);margin-top:1px}
.gc-status{font-size:12px;font-weight:700;color:var(--muted)}
.gc-status.done{color:var(--green)}
.gc-status.partial{color:var(--blue)}
.gc-teams{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.gc-team{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);padding:3px 8px;background:var(--bg);border-radius:7px}
.gc-done-mark{position:absolute;top:14px;right:14px;width:24px;height:24px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px}
.gc-arrow{position:absolute;right:16px;bottom:16px;color:var(--dim);font-size:16px;transition:all .2s}
.group-card:hover .gc-arrow{color:var(--blue);right:12px}

/* ── Group detail ── */
.gd-back{display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-size:14px;font-weight:700;background:var(--blue-light);padding:10px 18px;border-radius:var(--r2);border:1.5px solid var(--blue-mid);transition:all .15s;margin-bottom:18px}
.gd-back:hover{background:var(--blue);color:white;border-color:var(--blue)}
.gd-hero{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;border-radius:var(--r3);padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden}
.gd-hero::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%}
.gd-hero-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.gd-letter{font-size:44px;font-weight:900;line-height:1;opacity:.95}
.gd-hero-text h2{font-size:20px;font-weight:800}
.gd-hero-text p{font-size:13px;opacity:.8;margin-top:3px}
.gd-team-badges{display:flex;flex-wrap:wrap;gap:8px}
.gd-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border-radius:8px;padding:5px 10px;font-size:13px;font-weight:600;backdrop-filter:blur(4px)}
.gd-progress{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px 18px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.gd-prog-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.gd-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.gd-prog-label{font-size:12px;color:var(--muted);min-width:120px}
.gd-prog-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.gd-prog-fill{height:5px;border-radius:3px;transition:width .5s}
.gd-prog-fill.blue{background:var(--blue)}
.gd-prog-fill.green{background:var(--green)}
.gd-prog-count{font-size:11px;font-weight:700;min-width:32px;text-align:right;color:var(--muted)}
.gd-prog-count.done{color:var(--green)}
.complete-banner{background:linear-gradient(135deg,var(--green-light),#ecfdf5);border:1.5px solid rgba(5,150,105,.3);border-radius:var(--r2);padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px;animation:popIn .4s ease}
@keyframes popIn{0%{transform:scale(.96);opacity:0}60%{transform:scale(1.01)}100%{opacity:1;transform:none}}
.cb-icon{font-size:30px}
.cb-text h3{font-size:15px;font-weight:800;color:var(--green-dark)}
.cb-text p{font-size:12px;color:var(--muted);margin-top:2px}
.section-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.section-badge{background:var(--blue-light);color:var(--blue);border-radius:20px;padding:2px 10px;font-size:11px;text-transform:none;letter-spacing:0;font-weight:600}

/* ── Standings ── */
.standings-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r3);padding:18px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.standings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.standing-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 14px;transition:all .15s}
.standing-row.filled{border-color:var(--blue-mid);background:var(--blue-light)}
.standing-pos{font-size:18px;font-weight:900;color:var(--blue);min-width:26px}
.standing-sel{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none}
.standing-sel option{background:var(--white);color:var(--text)}
.standing-check{font-size:14px;color:var(--green);opacity:0;transition:opacity .2s}
.standing-check.show{opacity:1}

/* ── Match card with H/U/B ── */
.matches-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r3);padding:16px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.md-header{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;padding:6px 0 10px;margin-top:4px}
.md-header:first-child{margin-top:0}
.match{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;transition:all .15s}
.match:last-child{margin-bottom:0}
.match.tipped{border-color:var(--blue-mid);background:var(--blue-light)}
.match.done{border-color:rgba(5,150,105,.3);background:var(--green-light)}
.match.locked{opacity:.7}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.match-round{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.match-time{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.time-chip{background:var(--blue-light);color:var(--blue);border-radius:6px;padding:2px 7px;font-weight:800;font-size:11px}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:10px}
.team{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.team.home{justify-content:flex-end}
.team.away{justify-content:flex-start}
.team-flag{font-size:20px}
.match-vs{font-size:12px;font-weight:800;color:var(--dim);text-align:center}
.hub-row{display:flex;gap:6px;justify-content:center}
.hub-btn{flex:1;max-width:64px;padding:8px 0;border-radius:var(--r);border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-size:13px;font-weight:700;transition:all .15s}
.hub-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.hub-btn.active{background:var(--blue);color:white;border-color:var(--blue);box-shadow:0 2px 8px rgba(37,99,235,.3)}
.hub-btn:disabled{cursor:not-allowed}
.match-result{display:flex;justify-content:center;margin-top:8px}
.rb{font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.rb.correct{background:var(--green-light);color:var(--green-dark);border:1px solid rgba(5,150,105,.25)}
.rb.wrong{background:var(--bg);color:var(--dim);border:1px solid var(--border)}
.rb.pending{color:var(--muted);font-size:11px}
.actual-res{font-size:22px;font-weight:900;color:var(--text);text-align:center;padding:4px 0}
.actual-label{font-size:11px;color:var(--muted);text-align:center;margin-bottom:4px}

/* ── Footer nav in group detail ── */
.gd-footer{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:2px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;z-index:50;backdrop-filter:blur(8px)}
.gd-footer .center{font-size:12px;font-weight:700;color:var(--muted)}
.btn-nav{display:flex;align-items:center;gap:6px;padding:11px 20px;background:var(--blue);border:none;border-radius:var(--r2);color:white;font-size:14px;font-weight:700;transition:all .15s;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.btn-nav:hover{background:var(--blue2);transform:translateY(-1px)}
.btn-nav.green{background:var(--green);box-shadow:0 2px 8px rgba(5,150,105,.25)}
.btn-nav.green:hover{background:var(--green-dark)}

/* ── Knockout locked ── */
.ko-locked{background:var(--white);border:2px dashed var(--border2);border-radius:var(--r3);padding:40px 24px;text-align:center;margin-top:20px}
.ko-locked-icon{font-size:40px;margin-bottom:12px}
.ko-locked-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px}
.ko-locked-sub{font-size:14px;color:var(--muted);line-height:1.6}
.ko-locked-date{display:inline-block;background:var(--blue-light);color:var(--blue);font-weight:700;font-size:14px;padding:6px 18px;border-radius:20px;margin-top:12px}

/* ── Bracket symmetric ── */
.bracket-sym{display:flex;align-items:flex-start;gap:0;padding:8px 0 16px}
.bracket-col{flex-shrink:0;width:185px}
.bracket-col-hdr{font-weight:700;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding:0 4px}
.bracket-pair{position:relative}
.bracket-pair.has-conn::after{content:"";position:absolute;right:-16px;width:16px;top:25%;bottom:25%;border-right:2px solid var(--border2);border-top:2px solid var(--border2);border-bottom:2px solid var(--border2);}
.bracket-pair.has-conn-r::after{content:"";position:absolute;left:-16px;width:16px;top:25%;bottom:25%;border-left:2px solid var(--border2);border-top:2px solid var(--border2);border-bottom:2px solid var(--border2);}
.bracket-pair.has-conn-h::after{content:"";position:absolute;right:-16px;width:16px;top:50%;height:0;border-top:2px solid var(--border2);}
.bracket-pair.has-conn-h-r::after{content:"";position:absolute;left:-16px;width:16px;top:50%;height:0;border-top:2px solid var(--border2);}
.bk-slot{display:flex;align-items:center;}
.bracket-gap{width:16px;flex-shrink:0}
.bracket-center{flex-shrink:0;width:185px;display:flex;flex-direction:column;align-items:center;padding:0 4px}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;
const GROUPS = "ABCDEFGHIJKL".split("");
const STAGE_NO = {group:"Gruppe",r32:"Runde av 32",r16:"Åttedelsfinale",qf:"Kvartfinale",sf:"Semifinale","3rd":"Bronsefinale",final:"Finale"};
const DEADLINE = new Date("2026-06-11T19:00:00.000Z"); // 21:00 CEST

async function api(path, opts={}) {
  const token = localStorage.getItem("token");
  const res = await fetch(path, {
    ...opts,
    headers: {"Content-Type":"application/json",...(token?{Authorization:"Bearer "+token}:{}),...(opts.headers||{})},
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Feil");
  return data;
}

function useToast() {
  const [t,setT] = useState(null);
  const timer = useRef(null);
  const show = useCallback((msg,type="ok")=>{
    clearTimeout(timer.current);setT({msg,type});
    timer.current=setTimeout(()=>setT(null),3200);
  },[]);
  return [t,show];
}

const fmt = d => {
  if(!d) return "";
  return new Date(d+(d.length===10?"T12:00:00":"")).toLocaleDateString("no-NO",{day:"numeric",month:"short"});
};
// Tider i databasen er norsk tid (CEST) – vises direkte
const toNorskTid = (dateStr, timeStr) => timeStr||"";
const rankIcon = i => ["🥇","🥈","🥉"][i] ?? `${i+1}.`;
const isPastDeadline = () => new Date() > DEADLINE;

const KO_DEADLINE = new Date("2026-06-28T19:00:00.000Z"); // 21:00 CEST
const KO_BRACKET = {
  leftR32:  [2291,2294, 2289,2292, 2300,2299, 2298,2297],
  leftR16:  [2305,2306, 2307,2308],
  leftQF:   [2313,2314],
  leftSF:   [2317],
  final:    [2320],
  rightSF:  [2318],
  rightQF:  [2315,2316],
  rightR16: [2309,2310, 2311,2312],

};
const BRACKET_NEXT = {
  2291:{nextId:2305,side:"home"}, 2294:{nextId:2305,side:"away"},
  2289:{nextId:2306,side:"home"}, 2292:{nextId:2306,side:"away"},
  2300:{nextId:2307,side:"home"}, 2299:{nextId:2307,side:"away"},
  2298:{nextId:2308,side:"home"}, 2297:{nextId:2308,side:"away"},
  2305:{nextId:2313,side:"home"}, 2306:{nextId:2313,side:"away"},
  2307:{nextId:2314,side:"home"}, 2308:{nextId:2314,side:"away"},
  2313:{nextId:2317,side:"home"}, 2314:{nextId:2317,side:"away"},
  2317:{nextId:2320,side:"home"},
  2290:{nextId:2309,side:"home"}, 2293:{nextId:2309,side:"away"},

};

// ── Countdown ──
function Countdown() {
  const [rem,setRem] = useState(null);
  useEffect(()=>{
    function tick(){
      const diff = DEADLINE - new Date();
      if(diff<=0){setRem(null);return;}
      setRem({
        days: Math.floor(diff/86400000),
        hours: Math.floor((diff%86400000)/3600000),
        mins: Math.floor((diff%3600000)/60000),
        secs: Math.floor((diff%60000)/1000),
      });
    }
    tick();
    const id = setInterval(tick,1000);
    return ()=>clearInterval(id);
  },[]);
  if(!rem) return <div className="deadline-passed">⏰ Fristen er ute – tipping er stengt</div>;
  const p = n => String(n).padStart(2,"0");
  return(
    <div className="countdown">
      <div className="cd-unit"><span className="cd-num">{rem.days}</span><span className="cd-label">dager</span></div>
      <span className="cd-sep">:</span>
      <div className="cd-unit"><span className="cd-num">{p(rem.hours)}</span><span className="cd-label">timer</span></div>
      <span className="cd-sep">:</span>
      <div className="cd-unit"><span className="cd-num">{p(rem.mins)}</span><span className="cd-label">min</span></div>
      <span className="cd-sep">:</span>
      <div className="cd-unit"><span className="cd-num">{p(rem.secs)}</span><span className="cd-label">sek</span></div>
    </div>
  );
}

// ── KoCountdown ──
function KoCountdown() {
  const [rem,setRem]=useState(null);
  useEffect(()=>{
    function tick(){
      const diff=KO_DEADLINE-new Date();
      if(diff<=0){setRem(null);return;}
      const d=Math.floor(diff/86400000);
      setRem({days:d,hours:Math.floor((diff%86400000)/3600000),mins:Math.floor((diff%3600000)/60000),secs:Math.floor((diff%60000)/1000)});
    }
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[]);
  if(!rem)return<div className="deadline-passed">⏰ Tippingsfrist er ute</div>;
  const p=n=>String(n).padStart(2,"0");
  return(
    <div className="countdown">
      {rem.days>0&&<><div className="cd-unit"><span className="cd-num">{rem.days}</span><span className="cd-label">dager</span></div><span className="cd-sep">:</span></>}
      <div className="cd-unit"><span className="cd-num">{p(rem.hours)}</span><span className="cd-label">timer</span></div>
      <span className="cd-sep">:</span>
      <div className="cd-unit"><span className="cd-num">{p(rem.mins)}</span><span className="cd-label">min</span></div>
      <span className="cd-sep">:</span>
      <div className="cd-unit"><span className="cd-num">{p(rem.secs)}</span><span className="cd-label">sek</span></div>
    </div>
  );
}

// ── Landing ──
function LandingPage({onLogin}) {
  const [name,setName]=useState("");
  const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  async function submit(e){
    e.preventDefault();setErr("");setLoading(true);
    try{
      const d = await api("/api/auth/login-or-register",{method:"POST",body:JSON.stringify({name:name.trim()})});
      localStorage.setItem("token",d.token);onLogin(d.user);
    }catch(ex){setErr(ex.message);}finally{setLoading(false);}
  }
  return(
    <div className="landing">
      <div className="landing-card">
        <div className="landing-top">
          <div className="landing-ball">⚽</div>
          <h1 className="landing-title">VM-konkurranse 2026</h1>
          <p className="landing-sub">USA · Canada · Mexico<br/><strong>11. juni – 19. juli 2026</strong></p>
        </div>
        <form onSubmit={submit}>
          <div className="inp-field"><label className="inp-label">Navn</label>
            <input className="inp" type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Ditt fulle navn" autoFocus/>
          </div>
          {err&&<div className="err-msg">{err}</div>}
          <button className="btn-primary" disabled={loading||!name.trim()}>
            {loading?"Laster...":"Bli med →"}
          </button>
        </form>
        <p className="landing-note">Allerede registrert? Skriv inn samme navn for å logge inn igjen</p>
      </div>
    </div>
  );
}

// ── Submit Modal ──
function SubmitModal({onClose,onConfirm,predictions,standings,mySpecial,loading}) {
  const [confirmed,setConfirmed]=useState(false);
  const groupMatches = 72;
  const tipped = Object.keys(predictions).length;
  const standingsCount = Object.values(standings).reduce((s,g)=>s+Object.values(g).filter(Boolean).length,0);
  const specialCount = Object.keys(mySpecial).length;
  const missing = [];
  if(tipped<groupMatches) missing.push(`${groupMatches-tipped} kamptips mangler`);
  if(standingsCount<48) missing.push(`${48-standingsCount} tabellplasseringer mangler`);
  if(specialCount<10) missing.push(`${10-specialCount} spesialtips mangler`);
  const hasMissing = missing.length>0;
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal submit-modal" style={{marginTop:40}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:40,marginBottom:8}}>📬</div>
          <h2>Send inn tipping?</h2>
          <p>Når du sender inn låses tippingen din og kan ikke endres.</p>
        </div>
        <div className="submit-summary">
          <div className="submit-summary-row"><span className="label">Kamptips (gruppespill)</span><span className="val" style={{color:tipped<groupMatches?"var(--amber)":"var(--green)"}}>{tipped}/{groupMatches}</span></div>
          <div className="submit-summary-row"><span className="label">Tabellplasseringer</span><span className="val" style={{color:standingsCount<48?"var(--amber)":"var(--green)"}}>{standingsCount}/48</span></div>
          <div className="submit-summary-row"><span className="label">Spesialtips</span><span className="val" style={{color:specialCount<10?"var(--amber)":"var(--green)"}}>{specialCount}/10</span></div>
        </div>
        {hasMissing&&(
          <div style={{background:"var(--amber-light)",border:"1.5px solid rgba(217,119,6,.4)",borderRadius:"var(--r2)",padding:"12px 14px",marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--amber)",marginBottom:8}}>⚠️ Du har ikke fylt inn alt:</div>
            {missing.map(m=><div key={m} style={{fontSize:13,color:"var(--amber)",paddingLeft:8}}>• {m}</div>)}
            <label style={{display:"flex",alignItems:"center",gap:8,marginTop:12,cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--text2)"}}>
              <input type="checkbox" checked={confirmed} onChange={e=>setConfirmed(e.target.checked)} style={{width:16,height:16,cursor:"pointer"}}/>
              Jeg forstår at jeg ikke har fylt inn alt
            </label>
          </div>
        )}
        <div className="submit-actions">
          <button className="btn-cancel" onClick={onClose} disabled={loading}>Avbryt</button>
          <button className="btn-confirm" onClick={onConfirm} disabled={loading||(hasMissing&&!confirmed)}>{loading?"Sender...":"✓ Send inn og lås"}</button>
        </div>
      </div>
    </div>
  );
}

// ── H/U/B Match card ──
function MatchCard({m,result,onPick,flags,locked}) {
  const [saving,setSaving]=useState(false);
  const isTbd = m.home_team==="TBD";
  const finished = m.status==="finished";
  const actualRes = finished&&m.home_score!==null ? (m.home_score>m.away_score?"H":m.home_score<m.away_score?"B":"U") : null;
  const isCorrect = result&&actualRes&&result===actualRes;
  const isWrong = result&&actualRes&&result!==actualRes;
  const resLabel = r => r==="H"?"🏠 Hjemme":r==="U"?"🤝 Uavgjort":"✈️ Borte";
  async function pick(r){
    if(locked||finished||saving)return;
    setSaving(true);
    try{await onPick(m.id,r);}catch{}
    setSaving(false);
  }
  const cls=`match ${finished?"done":result?"tipped":""} ${locked?"locked":""}`;
  return(
    <div className={cls}>
      <div className="match-top">
        <span className="match-round">{m.matchday?`Runde ${m.matchday}`:STAGE_NO[m.stage]||m.stage}</span>
        <span className="match-time">{fmt(m.match_date)}{m.match_time&&<span className="time-chip">{toNorskTid(m.match_date,m.match_time)}</span>}</span>
      </div>
      {isTbd?(
        <div style={{color:"var(--dim)",fontSize:13,textAlign:"center",padding:"4px 0"}}>{m.label||"Kamp TBD"}</div>
      ):(
        <>
          <div className="match-teams">
            <div className="team home"><span style={{fontWeight:700}}>{m.home_team}</span></div>
            <div className="match-vs">–</div>
            <div className="team away"><span style={{fontWeight:700}}>{m.away_team}</span></div>
          </div>
          {finished?(
            <div>
              <div className="actual-label">Resultat</div>
              <div className="actual-res">{m.home_score} – {m.away_score}</div>
            </div>
          ):(
            <div className="hub-row">
              {["H","U","B"].map(r=>(
                <button key={r} className={`hub-btn ${result===r?"active":""}`} onClick={()=>pick(r)} disabled={locked||saving}>
                  {r}
                </button>
              ))}
            </div>
          )}
        </>
      )}
      <div className="match-result">
        {finished&&result&&!isTbd&&(
          isCorrect
            ?<span className="rb correct">✓ Riktig · {resLabel(result)} · +3p</span>
            :<span className="rb wrong">✗ Feil · Ditt tips: {resLabel(result)}</span>
        )}
        {!finished&&result&&!isTbd&&(
          <span className="rb pending">{resLabel(result)}</span>
        )}
      </div>
    </div>
  );
}

// ── Standings ──
function StandingsInput({group,teams,standings,onSave,locked}) {
  const [vals,setVals]=useState({1:"",2:"",3:"",4:"",...standings});
  const [checks,setChecks]=useState({});
  useEffect(()=>setVals({1:"",2:"",3:"",4:"",...standings}),[standings]);
  const used=Object.values(vals).filter(Boolean);
  async function pick(pos,team){
    setVals(p=>({...p,[pos]:team}));
    if(!team||locked)return;
    try{await onSave(group,pos,team);setChecks(p=>({...p,[pos]:true}));setTimeout(()=>setChecks(p=>({...p,[pos]:false})),1500);}catch{}
  }
  return(
    <div className="standings-card">
      <div className="section-label" style={{marginBottom:12}}>📋 Tabellplassering <span className="section-badge">3p per riktig · +10p bonus for perfekt gruppe</span></div>
      <div className="standings-grid">
        {[1,2,3,4].map(pos=>(
          <div key={pos} className={`standing-row ${vals[pos]?"filled":""}`}>
            <span className="standing-pos">{pos}.</span>
            <select className="standing-sel" value={vals[pos]||""} onChange={e=>pick(pos,e.target.value)} disabled={locked}>
              <option value="">Velg lag…</option>
              {teams.map(t=>(
                <option key={t.name} value={t.name} disabled={used.includes(t.name)&&vals[pos]!==t.name}>
                  {t.flag} {t.name}
                </option>
              ))}
            </select>
            <span className={`standing-check ${checks[pos]||vals[pos]?"show":""}`}>{checks[pos]?"✓":"·"}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function GroupsOverview({matches,predictions,standings,groupsMeta,onSelectGroup,onNavigate,currentUser,onSave,flags}) {

    for(const g of GROUPS){

      s[g]={pred,stand,done:pred===6&&stand===4,partial:pred>0||stand>0};

  },[matches,predictions,standings]);
  const totalPred=Object.values(stats).reduce((s,g)=>s+g.pred,0);
  const totalStand=Object.values(stats).reduce((s,g)=>s+g.stand,0);

function KnockoutMatchCard({match,pred,flags,onSave,locked,effectiveHome,effectiveAway}) {
  const effHome = effectiveHome ?? match.home_team;
  const effAway = effectiveAway ?? match.away_team;
  const isTBD = effHome==="TBD"||effAway==="TBD";
  const res = pred?.result;
  const [hsp,setHsp]=useState(pred?.home_score_pred!=null?String(pred.home_score_pred):"");
  const [asp,setAsp]=useState(pred?.away_score_pred!=null?String(pred.away_score_pred):"");
  const [saving,setSaving]=useState(false);

  async function pick(r) {
    if(locked||isTBD) return;
    setSaving(true);
    try{
      const h=hsp!==""?parseInt(hsp):null;
      const a=asp!==""?parseInt(asp):null;
      await onSave(match.id,r,h,a);
    }finally{setSaving(false);}
  }
  async function saveScore() {
    if(locked||isTBD||res==null) return;
    const h=hsp!==""?parseInt(hsp):null;
    const a=asp!==""?parseInt(asp):null;
    if(h==null||a==null) return;
    setSaving(true);
    try{await onSave(match.id,res,h,a);}finally{setSaving(false);}
  }

  const hf=flags[effHome]||"";
  const af=flags[effAway]||"";
  const finished=match.status==="finished";
  const actual=finished&&match.home_score!=null?(match.home_score>match.away_score?"H":"B"):null;

  return(
    <div style={{background:"var(--white)",border:"1.5px solid var(--border)",borderRadius:"var(--r2)",padding:"8px 10px",opacity:isTBD?0.45:1}}>
      <div style={{fontSize:10,color:"var(--muted)",marginBottom:5,fontWeight:600}}>
        {match.label}
        {finished&&<span style={{marginLeft:6,color:"var(--green)",fontWeight:700}}>{match.home_score}–{match.away_score}</span>}
      </div>
      {[
        {team:effHome,flag:hf,r:"H",scoreVal:hsp,setScore:setHsp},
        {team:effAway,flag:af,r:"B",scoreVal:asp,setScore:setAsp},
      ].map(({team,flag,r,scoreVal,setScore})=>(
        <div key={r} style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
          <button type="button" onClick={()=>pick(r)}
            disabled={locked||isTBD||saving}
            style={{flex:1,display:"flex",alignItems:"center",gap:5,padding:"4px 6px",borderRadius:"var(--r)",
              border:`2px solid ${res===r?"var(--blue)":actual===r?"var(--green)":"var(--border)"}`,
              background:res===r?"var(--blue-light)":actual===r?"var(--green-light)":"var(--white)",
              cursor:locked||isTBD?"default":"pointer"}}>
            <span style={{fontSize:13}}>{flag}</span>
            <span style={{flex:1,fontSize:11,fontWeight:res===r?700:400}}>{team}</span>
            {res===r&&<span style={{fontSize:9,color:"var(--blue)"}}>✓</span>}
            {actual===r&&res!==r&&<span style={{fontSize:9,color:"var(--green)"}}>✓</span>}
          </button>
          {!locked&&!isTBD&&(
            <input type="number" min="0" max="20" value={scoreVal}
              onChange={e=>setScore(e.target.value)}
              onBlur={saveScore}
              style={{width:28,textAlign:"center",fontSize:11,padding:"1px 2px",border:"1px solid var(--border)",borderRadius:4,background:"var(--bg)"}}/>
          )}
        </div>
      ))}
      {(pred?.home_score_pred!=null)&&locked&&(
        <div style={{fontSize:10,color:"var(--muted)",marginTop:3}}>Stilling: {pred.home_score_pred}–{pred.away_score_pred}</div>
      )}
    </div>
  );
}

function KnockoutBracket({matches,predictions,flags,onSave,locked,mySpecial}) {
  const byId={};
  for(const m of matches) byId[m.id]=m;

  // SF losers feed the bronze final: left SF → home, right SF → away
  const BRONZE_ID = KO_BRACKET["3rd"][0];
  const BRONZE_SRC = {home: KO_BRACKET.leftSF[0], away: KO_BRACKET.rightSF[0]};
  function resolveTeam(id,side,preds){
    const m=byId[id]; if(!m) return "TBD";
    const t=side==="home"?m.home_team:m.away_team;
    if(t!=="TBD") return t;
    // Bronze final teams come from SF losers
    if(id===BRONZE_ID){
      const sfId=BRONZE_SRC[side];
      const pred=preds[sfId];
      if(!pred) return "TBD";
      // loser = the team NOT picked as winner
      return resolveTeam(sfId,pred.result==="H"?"away":"home",preds);
    }
    for(const [srcId,nxt] of Object.entries(BRACKET_NEXT)){
      if(nxt.nextId===id&&nxt.side===side){
        const pred=preds[Number(srcId)];
        if(!pred) return "TBD";
        return resolveTeam(Number(srcId),pred.result==="H"?"home":"away",preds);
      }
    }
    return "TBD";
  }

  function card(id){
    const m=byId[id]; if(!m) return null;
    const effHome=resolveTeam(id,"home",predictions);
    const effAway=resolveTeam(id,"away",predictions);
    return<KnockoutMatchCard key={id} match={m} pred={predictions[id]} flags={flags}
      onSave={onSave} locked={locked} effectiveHome={effHome} effectiveAway={effAway}/>;
  }

  function col(ids,label,connCls,pairSize=2,slotH=110){
    const groups=[];
    for(let i=0;i<ids.length;i+=pairSize) groups.push(ids.slice(i,i+pairSize));
    return(
      <div className="bracket-col">
        <div className="bracket-col-hdr">{label}</div>
        {groups.map((grp,gi)=>(
          <div key={gi} className={`bracket-pair${connCls?" "+connCls:""}`}>
            {grp.map(id=>(
              <div key={id} className="bk-slot" style={{height:slotH}}>
                <div style={{width:"100%"}}>{card(id)}</div>
              </div>
            ))}
          </div>
        ))}
      </div>
    );
  }

  const champFlag = mySpecial?.champion ? (flags[mySpecial.champion]||"") : "";

  return(
    <div style={{overflowX:"auto"}}>
      <div className="bracket-sym">
        {col(KO_BRACKET.leftR32,"16-del","has-conn",2,110)}
        <div className="bracket-gap"/>
        {col(KO_BRACKET.leftR16,"8-del","has-conn",2,220)}
        <div className="bracket-gap"/>
        {col(KO_BRACKET.leftQF,"Kvartfinale","has-conn",2,440)}
        <div className="bracket-gap"/>
        {col(KO_BRACKET.leftSF,"Semifinale","has-conn-h",1,880)}
        <div className="bracket-gap"/>
        <div className="bracket-center" style={{height:880,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 4px"}}>
          <div className="bracket-center-hdr">🏆 Finale</div>
          <div style={{width:"100%"}}>{card(KO_BRACKET.final[0])}</div>
          {mySpecial?.champion&&(
            <div style={{fontSize:10,color:"var(--muted)",textAlign:"center",marginTop:6,padding:"5px 8px",background:"var(--bg)",borderRadius:"var(--r)",border:"1px solid var(--border)",lineHeight:1.4}}>
              💡 Du tippet {champFlag} {mySpecial.champion} som VM-meister i Spesialtips — treng ikkje vere det same her
            </div>
          )}
          <div style={{marginTop:36,width:"100%"}}>
            <div className="bracket-col-hdr">Bronsefinale</div>
            {card(KO_BRACKET["3rd"][0])}
          </div>
        </div>
        <div className="bracket-gap"/>
        {col(KO_BRACKET.rightSF,"Semifinale","has-conn-h-r",1,880)}
        <div className="bracket-gap"/>
        {col(KO_BRACKET.rightQF,"Kvartfinale","has-conn-r",2,440)}
        <div className="bracket-gap"/>
        {col(KO_BRACKET.rightR16,"8-del","has-conn-r",2,220)}
        <div className="bracket-gap"/>
        {col(KO_BRACKET.rightR32,"16-del","has-conn-r",2,110)}
      </div>
    </div>
  );
}

                <div key={pos} style={{display:"flex",gap:8,fontSize:13,padding:"3px 0",alignItems:"center"}}>
                  <span style={{color:"var(--dim)",minWidth:20,fontWeight:800}}>{pos}.</span>
                  <span>{r?<span>{flags[r.team]||""} {r.team}</span>:<span style={{color:"var(--dim)"}}>–</span>}</span>
                </div>
              );})}
            </div>
          ))}
          {!Object.keys(byGroup).length&&<div className="empty">Ingen tabellsvar</div>}
        </div>
      )}
      {tab==="knockout"&&(()=>{
        const STAGE_PTS={r32:4,r16:5,qf:6,sf:8,"3rd":6,final:12};
        const STAGE_LBL={r32:"16-delsfinale",r16:"8-delsfinale",qf:"Kvartfinale",sf:"Semifinale","3rd":"Bronsefinale",final:"Finale"};
        const koMatches=[...matches].filter(m=>m.stage!=="group")
          .sort((a,b)=>{const so=["r32","r16","qf","sf","3rd","final"];return so.indexOf(a.stage)-so.indexOf(b.stage)||a.id-b.id;});
        const koWithPred=koMatches.filter(m=>predictions[m.id]?.result);
        return(
          <div style={{overflowX:"auto"}}>
            <table className="pred-table">
              <thead><tr><th>Kamp</th><th>Runde</th><th>Tips</th><th>Stilling</th><th>Fasit</th><th>Pts</th></tr></thead>
              <tbody>
                {koWithPred.map(m=>{
                  const pred=predictions[m.id];
                  const res=pred.result;
                  const finished=m.status==="finished"&&m.home_score!==null;
                  const actR=finished?(m.home_score>m.away_score?"H":"B"):null;
                  const correct=finished&&actR===res;
                  const base=STAGE_PTS[m.stage]??4;
                  const scoreBonus=finished&&correct&&pred.home_score_pred!=null&&pred.away_score_pred!=null&&pred.home_score_pred===m.home_score&&pred.away_score_pred===m.away_score?3:0;
                  const pts=correct?base+scoreBonus:0;
                  const predScore=pred.home_score_pred!=null&&pred.away_score_pred!=null?`${pred.home_score_pred}–${pred.away_score_pred}`:"–";
                  const actScore=finished?`${m.home_score}–${m.away_score}`:"–";
                  return(
                    <tr key={m.id}>
                      <td style={{fontWeight:700,fontSize:12}}>{m.label||`${m.home_team} – ${m.away_team}`}</td>
                      <td style={{color:"var(--muted)",fontSize:11}}>{STAGE_LBL[m.stage]||m.stage}</td>
                      <td><strong>{res==="H"?"🏠 H":res==="B"?"✈️ B":"–"}</strong></td>
                      <td style={{fontSize:12}}>{predScore}</td>
                      <td style={{fontSize:12}}>{finished?`${actScore} (${actR==="H"?"H":"B"})`:"–"}</td>
                      <td style={{color:finished?(correct?"var(--green)":"var(--red)"):"var(--dim)",fontWeight:700}}>
                        {finished?(correct?`✓ ${pts}p`:"✗ 0p"):"–"}
                      </td>
                    </tr>
                  );
                })}
                {!koWithPred.length&&<tr><td colSpan="6"><div className="empty">Ingen sluttspilltips enno</div></td></tr>}
              </tbody>
            </table>
          </div>
        );
      })()}
      {tab==="special"&&(
        <table className="pred-table">
          <thead><tr><th>Kategori</th><th>Svar</th></tr></thead>
          <tbody>{categories.map(cat=>(
            <tr key={cat.id}><td>{cat.label}</td>
              <td>{mySpecial[cat.id]?<strong>{mySpecial[cat.id]}</strong>:<span style={{color:"var(--dim)"}}>–</span>}</td>
            </tr>
          ))}</tbody>
        </table>
      )}
    </div>
  );
}

// ── Admin: User Modal ──
function UserModal({userId,onClose,categories,flags,matches}) {
  const [data,setData]=useState(null);const [tab,setTab]=useState("matches");
  const [unlocking,setUnlocking]=useState(false);
  useEffect(()=>{api(`/api/admin/user/${userId}/predictions`).then(setData);},[userId]);

  const {user,predictions,specials,standings}=data;

  const byGroup={};for(const r of standings){if(!byGroup[r.group_name])byGroup[r.group_name]=[];byGroup[r.group_name].push(r);}
  const resLabel = r => r==="H"?"🏠 H":r==="U"?"🤝 U":r==="B"?"✈️ B":r||"–";
  const actualRes = (ah,aa) => ah===null?"–":ah>aa?"🏠 H":ah<aa?"✈️ B":"🤝 U";
  async function unlock(){
    if(!window.confirm(`Er du sikker på at du vil låse opp tippingen til ${user.name}?`))return;
    setUnlocking(true);
    try{
      await api(`/api/admin/user/${userId}/unlock`,{method:"POST"});

function AdminView({matches,categories,allTeams,flags,showToast,onRefresh}) {
  const [tab,setTab]=useState("matches");

  const [edits,setEdits]=useState({});
  const [spAnswers,setSpAnswers]=useState({});const [spInputs,setSpInputs]=useState({});
  const [stAnswers,setStAnswers]=useState({});const [stInputs,setStInputs]=useState({});
  const [users,setUsers]=useState([]);const [selUser,setSelUser]=useState(null);
  const [syncing,setSyncing]=useState(false);const [syncResult,setSyncResult]=useState(null);

  async function runSync(){
    setSyncing(true);setSyncResult(null);
    try{
      const r=await api("/api/sync",{method:"POST"});
      setSyncResult(`✓ Synka ${r.updated} kampar (${r.total} frå ESPN)`);
      onRefresh();
    }catch(ex){setSyncResult("✗ "+ex.message);}
    setSyncing(false);
  }

  useEffect(()=>{
    api("/api/admin/special-answers").then(d=>{setSpAnswers(d);setSpInputs({...d});}).catch(()=>{});
    api("/api/admin/standings-answers").then(d=>{setStAnswers(d);setStInputs(JSON.parse(JSON.stringify(d)));}).catch(()=>{});
    api("/api/admin/users").then(setUsers).catch(()=>{});
  },[]);

  const filtered=matches.filter(m=>m.stage===stage&&(stage!=="group"||m.group_name===group));

  async function saveMatch(id){
    const e=edits[id];if(!e)return;
    const body={};
    if(e.h!==""&&e.a!==""){body.homeScore=+e.h;body.awayScore=+e.a;body.status="finished";}
    if(e.ht)body.homeTeam=e.ht;if(e.at)body.awayTeam=e.at;
    if(e.time)body.matchTime=e.time;
    if(e.date)body.matchDate=e.date;
    if(!Object.keys(body).length)return;
    try{await api(`/api/admin/match/${id}`,{method:"POST",body:JSON.stringify(body)});showToast("✓ Kamp oppdatert");onRefresh();}
    catch(ex){showToast(ex.message,"bad");}
  }
  async function saveSpecial(id){
    const v=spInputs[id];if(!v?.trim())return;
    try{await api(`/api/admin/special-answer/${id}`,{method:"POST",body:JSON.stringify({value:v.trim()})});setSpAnswers(p=>({...p,[id]:v.trim()}));showToast("✓ Fasit lagret");}
    catch(ex){showToast(ex.message,"bad");}
  }
  async function saveStanding(g,pos,team){
    if(!team)return;
    try{await api(`/api/admin/standings-answer/${g}/${pos}`,{method:"POST",body:JSON.stringify({team})});setStAnswers(p=>({...p,[g]:{...(p[g]||{}),[pos]:team}}));showToast("✓ Lagret");}

              <button key={k} className={`atab ${tab===k?"on":""}`} onClick={()=>setTab(k)}>{l}</button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {syncResult&&<span style={{fontSize:11,color:syncResult.startsWith("✓")?"var(--green)":"var(--red)"}}>{syncResult}</span>}
            <button onClick={runSync} disabled={syncing}
              style={{fontSize:12,fontWeight:700,padding:"5px 12px",borderRadius:"var(--r)",border:"1.5px solid var(--blue)",
                background:"var(--blue-light)",color:"var(--blue)",cursor:syncing?"wait":"pointer"}}>
              {syncing?"⏳ Synkar…":"🔄 Sync ESPN"}
            </button>
          </div>
        </div>
      </div>

      {tab==="matches"&&(
        <div className="admin-card">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div className="admin-card-h" style={{marginBottom:0}}>Legg inn kampresultater</div>
            <a href="/api/admin/export" className="export-btn" style={{textDecoration:"none"}} onClick={e=>{const t=localStorage.getItem("token");if(!t){e.preventDefault();showToast("Logg inn som admin","bad");}}}>
              📥 Last ned Excel
            </a>
          </div>
          <div className="filter-row">
            <span className="filter-lbl">Runde:</span>
            <select className="inp" style={{flex:1}} value={stage} onChange={e=>setStage(e.target.value)}>

            </select>
            {stage==="group"&&<>
              <span className="filter-lbl">Gruppe:</span>
              <select className="inp" style={{flex:1}} value={group} onChange={e=>setGroup(e.target.value)}>
                {GROUPS.map(g=><option key={g} value={g}>Gruppe {g}</option>)}
              </select>
            </>}
          </div>
          {filtered.map(m=>{
            const e=edits[m.id]||{h:m.home_score??"",a:m.away_score??"",ht:"",at:"",time:m.match_time||"",date:m.match_date||""};
            const isTbd=m.home_team==="TBD";
            return(
              <div key={m.id} className="adm-match">
                <div className="adm-name">{isTbd?(m.label||`Kamp ${m.id}`):`${flags[m.home_team]||""} ${m.home_team} – ${m.away_team} ${flags[m.away_team]||""}`}</div>
                <div className="adm-date">{fmt(m.match_date)}</div>
                {isTbd&&<>
                  <input className="inp adm-si" style={{width:120,height:34,fontSize:12}} placeholder="Hjemmelag" value={e.ht||""} onChange={ev=>setEdits(p=>({...p,[m.id]:{...e,ht:ev.target.value}}))}/>
                  <input className="inp adm-si" style={{width:120,height:34,fontSize:12}} placeholder="Bortelag" value={e.at||""} onChange={ev=>setEdits(p=>({...p,[m.id]:{...e,at:ev.target.value}}))}/>
                </>}

                <input type="date" className="inp adm-si" style={{width:130,height:34,fontSize:12}} value={e.date||""} onChange={ev=>setEdits(p=>({...p,[m.id]:{...e,date:ev.target.value}}))}/>
                <input className="adm-si" type="number" min="0" max="20" placeholder="H" value={e.h} onChange={ev=>setEdits(p=>({...p,[m.id]:{...e,h:ev.target.value}}))}/>

      {tab==="special"&&(

          <div className="special-grid">
            {categories.map(cat=>(
              <div key={cat.id} className="sc">
                <div className="sc-top"><span className="sc-label">{cat.label}</span></div>
                <div className="sc-desc">{cat.desc}</div>
                <div className="sc-input-row">
                  {cat.type==="team"?(
                    <select className="inp" value={spInputs[cat.id]||""} onChange={e=>setSpInputs(p=>({...p,[cat.id]:e.target.value}))}>

                    <input className="inp" type={cat.type==="number"?"number":"text"} value={spInputs[cat.id]||""} onChange={e=>setSpInputs(p=>({...p,[cat.id]:e.target.value}))}/>
                  )}
                  <button className="btn-save" onClick={()=>saveSpecial(cat.id)}>Lagre</button>
                </div>
                {spAnswers[cat.id]&&<div className="sc-saved">✓ Fasit: {spAnswers[cat.id]}</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="standings"&&(
        <div className="admin-card">
          <div className="admin-card-h">Fasit for tabellplasseringer</div>
          <div className="groups-grid">
            {GROUPS.map(g=>{
              const gTeams=[...new Set(matches.filter(m=>m.group_name===g).flatMap(m=>[m.home_team,m.away_team]).filter(t=>t!=="TBD"))].sort();
              const inp=stInputs[g]||{};const cur=stAnswers[g]||{};
              return(
                <div key={g} style={{background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:14,padding:14}}>
                  <div style={{fontWeight:800,color:"var(--blue)",marginBottom:10,fontSize:15}}>Gruppe {g}</div>
                  {[1,2,3,4].map(pos=>(
                    <div key={pos} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span style={{minWidth:20,color:"var(--dim)",fontWeight:800}}>{pos}.</span>
                      <select className="inp" style={{flex:1,fontSize:12,padding:"6px 10px"}} value={inp[pos]||""} onChange={e=>{const v=e.target.value;setStInputs(p=>({...p,[g]:{...(p[g]||{}),[pos]:v}}));if(v)saveStanding(g,pos,v);}}>
                        <option value="">Velg lag…</option>
                        {gTeams.map(t=><option key={t} value={t}>{t}</option>)}
                      </select>
                      {cur[pos]&&<span style={{fontSize:11,color:"var(--green)",fontWeight:700}}>✓</span>}

      {tab==="users"&&(
        <div className="admin-card">
          <div className="admin-card-h">Brukeroversikt – klikk for å se tips</div>
          <div className="users-grid">
            {users.map(u=>(
              <div key={u.id} className={`user-card ${u.submitted_at?"submitted":""}`} onClick={()=>setSelUser(u.id)}>
                <div className="user-card-icon">{u.is_admin?"👑":"👤"}</div>
                <div className="user-card-name">{u.name}</div>
                {u.submitted_at&&<div style={{fontSize:10,color:"var(--green)",fontWeight:700,marginTop:4}}>✓ Sendt inn</div>}
              </div>
            ))}
          </div>
          <div style={{marginTop:18}}>
            <a href="/api/admin/export" className="export-btn" onClick={e=>{const t=localStorage.getItem("token");if(t){const url=new URL(e.currentTarget.href);fetch(url.pathname,{headers:{Authorization:"Bearer "+t}}).then(r=>r.blob()).then(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="vm2026-tipping.xlsx";a.click();});e.preventDefault();}else{e.preventDefault();showToast("Logg inn som admin","bad");}}}>
              📥 Last ned alle tips som Excel
            </a>
          </div>
        </div>
      )}
      {selUser&&<UserModal userId={selUser} onClose={()=>setSelUser(null)} categories={categories} flags={flags} matches={matches}/>}
    </div>
  );
}

// ── APP ──
function App() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("home");
  const [selectedGroup,setSelectedGroup]=useState(null);
  const [matches,setMatches]=useState([]);
  const [predictions,setPredictions]=useState({});
  const [standings,setStandings]=useState({});
  const [mySpecial,setMySpecial]=useState({});
  const [flags,setFlags]=useState({});
  const [groupsMeta,setGroupsMeta]=useState({});
  const [categories,setCategories]=useState([]);
  const [allTeams,setAllTeams]=useState([]);
  const [leaderboard,setLeaderboard]=useState([]);
  const [toast,showToast]=useToast();
  const [showSubmit,setShowSubmit]=useState(false);
  const [submitLoading,setSubmitLoading]=useState(false);
  const [showNotice,setShowNotice]=useState(false);

  useEffect(()=>{
    const token=localStorage.getItem("token");
    if(!token){setLoading(false);return;}
    api("/api/auth/me").then(u=>setUser(u)).catch(()=>localStorage.removeItem("token")).finally(()=>setLoading(false));
  },[]);
  useEffect(()=>{if(user)loadAll();},[user]);

  async function loadAll(){
    const [ms,preds,cats,teams,fl,gm,sp,st,lb]=await Promise.all([
      api("/api/matches"),api("/api/my-predictions"),api("/api/special-categories"),
      api("/api/teams"),api("/api/teams-with-flags"),api("/api/groups-meta"),
      api("/api/my-special"),api("/api/my-standings"),api("/api/leaderboard"),
    ]);
    setMatches(ms);
    const predMap={};
    for(const p of preds) predMap[p.match_id]={result:p.result,home_score_pred:p.home_score_pred??null,away_score_pred:p.away_score_pred??null};
    setPredictions(predMap);
    setCategories(cats);setAllTeams(teams);setFlags(fl);setGroupsMeta(gm);
    setMySpecial(sp);setStandings(st);setLeaderboard(lb);
  }
  async function refreshMatches(){const ms=await api("/api/matches");setMatches(ms);}

  async function handleSave(matchId,result,homeScorePred,awayScorePred){
    const body={result};
    if(homeScorePred!=null&&awayScorePred!=null){body.homeScorePred=homeScorePred;body.awayScorePred=awayScorePred;}
    await api(`/api/predictions/match/${matchId}`,{method:"POST",body:JSON.stringify(body)});
    setPredictions(p=>({...p,[matchId]:{result,home_score_pred:homeScorePred??null,away_score_pred:awayScorePred??null}}));
  }
  async function handleSpecialSave(cat,value){
    await api(`/api/predictions/special/${cat}`,{method:"POST",body:JSON.stringify({value})});
    setMySpecial(p=>({...p,[cat]:value}));
  }
  async function handleStandingSave(group,pos,team){
    await api(`/api/predictions/standings/${group}/${pos}`,{method:"POST",body:JSON.stringify({team})});
    setStandings(p=>({...p,[group]:{...(p[group]||{}),[pos]:team}}));
  }
  async function handleSubmit(){
    setSubmitLoading(true);
    try{
      await api("/api/submit",{method:"POST"});
      setUser(u=>({...u,submittedAt:new Date().toISOString()}));
      setShowSubmit(false);
      showToast("✅ Tipping sendt inn og låst!","ok");
    }catch(ex){showToast(ex.message,"bad");}finally{setSubmitLoading(false);}
  }

  useEffect(()=>{window.scrollTo(0,0);},[tab]);
  useEffect(()=>{
    if(user && !localStorage.getItem("vm2026_notice_v2")) setShowNotice(true);
  },[user]);

  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}><div className="spin"/></div>;
  if(!user) return <LandingPage onLogin={u=>{setUser(u);}}/>;


  const isLocked = !!user.submittedAt || isPastDeadline();
  const navTabs=[
    {id:"home",label:"🏠 Hjem"},
    {id:"groups",label:"⚽ Gruppespill"},
    {id:"knockout",label:"🏆 Sluttspill"},
    {id:"special",label:"🌟 Spesialtips"},
    {id:"mytips",label:"📋 Mine tips"},
    {id:"leaderboard",label:"📊 Ledertavle"},
    ...(user.isAdmin?[{id:"admin",label:"⚙️ Admin"}]:[]),
  ];

  return(
    <div className="shell">
      <header className="topbar">
        <div className="topbar-l">
          <span className="topbar-ball">⚽</span>
          <div><div className="topbar-brand">VM-konkurranse 2026</div><div className="topbar-year">USA · Canada · Mexico</div></div>
        </div>
        <div className="topbar-r">
          <span className="topbar-user">{user.name}{user.isAdmin?" 👑":""}</span>
          <button className="btn-ghost" onClick={()=>{localStorage.removeItem("token");setUser(null);}}>Logg ut</button>
        </div>
      </header>
      <nav>
        {navTabs.map(t=>(
          <button key={t.id} className={`nb ${tab===t.id&&!selectedGroup?"on":""}`}
            onClick={()=>{setTab(t.id);setSelectedGroup(null);}}>
            {t.label}
          </button>
        ))}
      </nav>

      {tab==="home"&&
        <Dashboard user={user} matches={matches} predictions={predictions} standings={standings}
          mySpecial={mySpecial} leaderboard={leaderboard} flags={flags}
          onNav={t=>{setTab(t);setSelectedGroup(null);}}
          onNavGroup={g=>{setTab("groups");setSelectedGroup(g);}}
          onSubmit={()=>setShowSubmit(true)}/>}

      {tab==="groups"&&!selectedGroup&&
        <GroupsOverview matches={matches} predictions={predictions} standings={standings}
          groupsMeta={groupsMeta} onSelectGroup={g=>{setSelectedGroup(g);setTab("groups");}} onNavigate={setTab}
          currentUser={user} onSave={handleSave} flags={flags}/>}

      {tab==="groups"&&selectedGroup&&
        <GroupDetailPage group={selectedGroup} groupsMeta={groupsMeta} matches={matches}
          predictions={predictions} standings={standings} flags={flags}
          onSave={handleSave} onStandingSave={handleStandingSave} locked={isLocked}
          onBack={()=>setSelectedGroup(null)} onNav={g=>setSelectedGroup(g)}/>}

      {tab==="knockout"&&
        <KnockoutView matches={matches} predictions={predictions} flags={flags} onSave={handleSave} mySpecial={mySpecial}/>}

      {tab==="special"&&
        <SpecialView categories={categories} allTeams={allTeams} mySpecial={mySpecial}
          onSave={handleSpecialSave} showToast={showToast} locked={isLocked} onNavigate={setTab}/>}

      {tab==="mytips"&&
        <MyTipsView matches={matches} predictions={predictions} standings={standings}
          mySpecial={mySpecial} categories={categories} flags={flags}/>}

      {tab==="leaderboard"&&<LeaderboardView currentUser={user}/>}

      {tab==="admin"&&user.isAdmin&&
        <AdminView matches={matches} categories={categories} allTeams={allTeams}
          flags={flags} showToast={showToast} onRefresh={refreshMatches}/>}

      {showSubmit&&
        <SubmitModal
          onClose={()=>setShowSubmit(false)} onConfirm={handleSubmit}
          predictions={predictions} standings={standings} mySpecial={mySpecial}
          loading={submitLoading}/>}

      {showNotice&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&(localStorage.setItem("vm2026_notice_v2","1"),setShowNotice(false))}>
        <div className="modal" style={{maxWidth:400,textAlign:"center",padding:"32px 28px"}}>
          <div style={{fontSize:48,marginBottom:12}}>🏆⚽</div>
          <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>No er det klart for å tippe!</h2>
          <p style={{color:"var(--muted)",lineHeight:1.6,marginBottom:20}}>
            Byggmester beklager sein lansering, men dokke klarer uansett ikkje slå meg. 😄
          </p>
          <p style={{color:"var(--muted)",lineHeight:1.6,marginBottom:24,fontWeight:600}}>
            Lykke til! 🎉
          </p>
          <button className="btn-primary" onClick={()=>{localStorage.setItem("vm2026_notice_v2","1");setShowNotice(false);}}>
            La oss sjå på det! →
          </button>
        </div>
      </div>}

      {toast&&<div className={`toast ${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
